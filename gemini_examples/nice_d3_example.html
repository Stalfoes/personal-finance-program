<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow Explorer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <style>
    /* Add some smooth transitions for SVG elements */
    .link-path { transition: opacity 0.3s ease-in-out; cursor: pointer; }
    .node-group { cursor: pointer; transition: opacity 0.3s ease-in-out; }
    .node-glow { transition: opacity 0.3s ease-in-out; }
    .link-label { transition: opacity 0.3s ease-in-out; pointer-events: none; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-4 sm:p-8 font-sans">

  <!-- HTMX Data Store (MOCK) -->
  <!-- 
    FASTAPI INTEGRATION NOTE: 
    When you want to update the chart (e.g. user selects a different month), 
    you can trigger an hx-get on this container. Your FastAPI backend should 
    return ONLY the <script type="application/json" id="chart-data"> block with the new data.
  -->
  <div id="data-store" style="display: none;">
    <script id="chart-data" type="application/json">
      {
        "nodes": [
          { "id": "salary", "label": "Primary Salary", "value": 6500, "type": "income", "col": 0 },
          { "id": "side_hustle", "label": "Side Hustle", "value": 1200, "type": "income", "col": 0 },
          { "id": "checking", "label": "Checking Account", "value": 7700, "type": "asset", "col": 1 },
          { "id": "housing", "label": "Housing & Utilities", "value": 2400, "type": "expense", "col": 2 },
          { "id": "food", "label": "Groceries & Dining", "value": 1100, "type": "expense", "col": 2 },
          { "id": "savings", "label": "High Yield Savings", "value": 1500, "type": "equity", "col": 2 },
          { "id": "investments", "label": "Brokerage / IRA", "value": 1200, "type": "liability", "col": 2 },
          { "id": "lifestyle", "label": "Lifestyle & Fun", "value": 1500, "type": "expense", "col": 2 }
        ],
        "links": [
          { "source": "salary", "target": "checking", "value": 6500 },
          { "source": "side_hustle", "target": "checking", "value": 1200 },
          { "source": "checking", "target": "housing", "value": 2400 },
          { "source": "checking", "target": "food", "value": 1100 },
          { "source": "checking", "target": "savings", "value": 1500 },
          { "source": "checking", "target": "investments", "value": 1200 },
          { "source": "checking", "target": "lifestyle", "value": 1500 }
        ]
      }
    </script>
  </div>

  <!-- UI Layout -->
  <div class="max-w-6xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        Cash Flow Explorer
      </h1>
      <p class="text-slate-500 mt-1">Visualize your money as interconnected pools.</p>
    </div>
    
    <!-- Controls -->
    <div class="flex bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
      <div class="px-3 py-1 text-sm font-medium text-slate-500 border-r border-slate-100 flex items-center gap-2">
        Curve Style
      </div>
      <button 
        id="btn-tension-direct"
        class="px-3 py-1 text-sm font-medium rounded-md transition-colors text-slate-500 hover:text-slate-700">
        Direct
      </button>
      <button 
        id="btn-tension-flowing"
        class="px-3 py-1 text-sm font-medium rounded-md transition-colors bg-slate-100 text-slate-900">
        Flowing
      </button>
      
      <!-- Example button to show how you'd trigger HTMX to reload data from FastAPI -->
      <div class="px-2 flex items-center border-l border-slate-100 ml-1">
          <!-- 
            hx-get="/api/cashflow" 
            hx-target="#data-store"
          -->
          <button hx-get="/api/sankey-data" hx-target="#data-store" class="text-xs font-semibold bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 transition">
             Reload Data
          </button>
      </div>
    </div>
  </div>

  <!-- Main Diagram Area -->
  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden relative">
    
    <!-- Quick Stats Overlay -->
    <div class="absolute top-6 left-6 flex gap-4 pointer-events-none z-10">
       <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
         <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Total In</div>
         <div id="stat-total-in" class="text-xl font-bold text-green-600">$7,700</div>
       </div>
       <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
         <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Total Out</div>
         <div id="stat-total-out" class="text-xl font-bold text-blue-600">$7,700</div>
       </div>
    </div>

    <!-- Drawing Canvas -->
    <div id="chart-container" class="w-full h-[650px] cursor-crosshair">
      <svg id="d3-svg" width="100%" height="100%" class="block"></svg>
    </div>
  </div>

  <div class="max-w-6xl mx-auto mt-6 text-center text-slate-500 text-sm">
    <p>Hover over any pool or flow to isolate its connections. Edge amounts are placed at the exact midpoint of the curve.</p>
  </div>

  <script>
    // --- STATE & UTILS ---
    let currentTension = 0.5; // Default flowing
    let hoveredNode = null;
    let hoveredLink = null;
    
    // Store calculated layout so hover functions can access topology
    let currentLayout = { nodes: [], links: [] }; 

    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

    const NODE_COLORS = {
      income: { fill: '#dcfce7', stroke: '#22c55e', text: '#166534' },      // Green
      asset: { fill: '#dbeafe', stroke: '#3b82f6', text: '#1e40af' },     // Blue
      expense: { fill: '#fee2e2', stroke: '#ef4444', text: '#991b1b' },     // Red
      equity: { fill: '#f3e8ff', stroke: '#a855f7', text: '#6b21a8' },     // Purple
      liability: { fill: '#fef08a', stroke: '#eab308', text: '#854d0e' }, // Yellow
    };

    // --- MAIN RENDER FUNCTION ---
    function renderChart() {
      // 1. Get raw data from the DOM (acts as our state store, updatable by HTMX)
      const dataScript = document.getElementById('chart-data');
      if (!dataScript) return;
      
      const rawData = JSON.parse(dataScript.textContent);
      const rawNodes = JSON.parse(JSON.stringify(rawData.nodes)); // Deep copy to avoid mutating source
      const rawLinks = JSON.parse(JSON.stringify(rawData.links));

      // 2. Get container dimensions
      const container = document.getElementById('chart-container');
      const width = container.clientWidth;
      const height = container.clientHeight;

      // 3. Compute Layout Math (Equivalent to useMemo in React)
      const cols = [];
      rawNodes.forEach(node => {
        if (!cols[node.col]) cols[node.col] = [];
        cols[node.col].push(node);
      });

      const colWidth = width / (cols.length || 1);
      
      const nodesWithPositions = rawNodes.map(node => {
        const colNodes = cols[node.col];
        const indexInCol = colNodes.indexOf(node);
        
        // Distribute nodes evenly on the Y axis
        const ySpacing = height / (colNodes.length + 1);
        const y = ySpacing * (indexInCol + 1);
        
        // Center columns on X axis
        const x = (colWidth * node.col) + (colWidth / 2);

        // Area math
        const areaScale = 1.2; 
        const radius = Math.max(25, Math.sqrt(node.value / Math.PI) * areaScale);

        return { ...node, x, y, radius };
      });

      const nodeMap = nodesWithPositions.reduce((acc, n) => ({ ...acc, [n.id]: n }), {});

      const linksWithPaths = rawLinks.map(link => {
        const source = nodeMap[link.source];
        const target = nodeMap[link.target];
        
        const strokeWidth = Math.max(4, (link.value / 7700) * 40);
        const controlPointXOffset = (target.x - source.x) * currentTension;
        const d = `M ${source.x} ${source.y} C ${source.x + controlPointXOffset} ${source.y}, ${target.x - controlPointXOffset} ${target.y}, ${target.x} ${target.y}`;
        const midX = (source.x + target.x) / 2;
        const midY = (source.y + target.y) / 2;

        return { ...link, sourceNode: source, targetNode: target, strokeWidth, d, midX, midY };
      });

      currentLayout = { nodes: nodesWithPositions, links: linksWithPaths };

      // Update Quick Stats overlay
      const totalIn = rawNodes.filter(n => n.type === 'income').reduce((sum, n) => sum + n.value, 0);
      const totalOut = rawLinks.filter(l => nodeMap[l.target].type !== 'account').reduce((sum, l) => sum + l.value, 0);
      document.getElementById('stat-total-in').innerText = formatCurrency(totalIn);
      document.getElementById('stat-total-out').innerText = formatCurrency(totalOut);

      // --- D3 DRAWING LOGIC ---
      const svg = d3.select("#d3-svg");
      svg.selectAll("*").remove(); // Clear previous drawing

      // Define Gradients
      const defs = svg.append("defs");
      linksWithPaths.forEach((link, i) => {
        const grad = defs.append("linearGradient")
          .attr("id", `grad-${link.source}-${link.target}`)
          .attr("x1", "0%").attr("y1", "0%")
          .attr("x2", "100%").attr("y2", "0%");
        grad.append("stop")
          .attr("offset", "0%")
          .attr("stop-color", NODE_COLORS[link.sourceNode.type].stroke);
        grad.append("stop")
          .attr("offset", "100%")
          .attr("stop-color", NODE_COLORS[link.targetNode.type].stroke);
      });

      // 1. Draw Links
      const linkGroup = svg.append("g").attr("class", "links-layer");
      
      const linkElements = linkGroup.selectAll(".link-path")
        .data(linksWithPaths)
        .enter()
        .append("path")
        .attr("class", "link-path")
        .attr("d", d => d.d)
        .attr("fill", "none")
        .attr("stroke", d => `url(#grad-${d.source}-${d.target})`)
        .attr("stroke-width", d => d.strokeWidth)
        .attr("stroke-linecap", "round")
        .attr("opacity", 0.3)
        .on("mouseenter", (event, d) => { hoveredLink = d; updateHighlights(); })
        .on("mouseleave", () => { hoveredLink = null; updateHighlights(); });

      // 2. Draw Link Labels (ForeignObjects)
      const labelGroup = svg.append("g").attr("class", "labels-layer");

      const labelElements = labelGroup.selectAll(".link-label")
        .data(linksWithPaths)
        .enter()
        .append("foreignObject")
        .attr("class", "link-label overflow-visible")
        .attr("x", d => d.midX - 45)
        .attr("y", d => d.midY - 14)
        .attr("width", 90)
        .attr("height", 28)
        .attr("opacity", 1);

      labelElements.append("xhtml:div")
        .attr("class", "flex items-center justify-center w-full h-full")
        .html(d => `
          <span class="flex items-center justify-center px-2 py-1 text-[11px] sm:text-xs font-bold text-slate-600 bg-white/95 backdrop-blur-sm border border-slate-200 rounded-full shadow-sm">
            ${formatCurrency(d.value)}
          </span>
        `);

      // 3. Draw Nodes
      const nodeGroupLayer = svg.append("g").attr("class", "nodes-layer");

      const nodes = nodeGroupLayer.selectAll(".node-group")
        .data(nodesWithPositions)
        .enter()
        .append("g")
        .attr("class", "node-group")
        .attr("transform", d => `translate(${d.x}, ${d.y})`)
        .on("mouseenter", (event, d) => { hoveredNode = d; updateHighlights(); })
        .on("mouseleave", () => { hoveredNode = null; updateHighlights(); });

      // Node Outer Glow
      nodes.append("circle")
        .attr("class", "node-glow")
        .attr("r", d => d.radius + 6)
        .attr("fill", "none")
        .attr("stroke", d => NODE_COLORS[d.type].stroke)
        .attr("stroke-width", 2)
        .attr("opacity", 0);

      // Node Main Circle
      nodes.append("circle")
        .attr("r", d => d.radius)
        .attr("fill", d => NODE_COLORS[d.type].fill)
        .attr("stroke", d => NODE_COLORS[d.type].stroke)
        .attr("stroke-width", 3)
        .attr("class", "drop-shadow-md");

      // Node Inner Text (Value)
      nodes.filter(d => d.radius > 35)
        .append("text")
        .attr("y", 4)
        .attr("text-anchor", "middle")
        .attr("fill", d => NODE_COLORS[d.type].text)
        .attr("class", "text-sm font-bold pointer-events-none")
        .text(d => formatCurrency(d.value));

      // Node Outer Text (Label)
      nodes.append("text")
        .attr("y", d => d.radius > 35 ? d.radius + 20 : d.radius + 15)
        .attr("text-anchor", "middle")
        .attr("fill", "#334155")
        .attr("class", "text-xs sm:text-sm font-semibold pointer-events-none drop-shadow-sm")
        .text(d => d.label);

      // Node Fallback Text (If circle too small)
      nodes.filter(d => d.radius <= 35)
        .append("text")
        .attr("y", d => d.radius + 32)
        .attr("text-anchor", "middle")
        .attr("fill", "#64748b")
        .attr("class", "text-xs font-medium pointer-events-none")
        .text(d => formatCurrency(d.value));

      // Initial Highlight state evaluation
      updateHighlights();
    }

    // --- INTERACTIVITY / HIGHLIGHT LOGIC ---
    function updateHighlights() {
      // Helper function to check connections
      const isConnected = (nodeA, nodeB) => {
        return currentLayout.links.some(l => 
          (l.source === nodeA.id && l.target === nodeB.id) || 
          (l.target === nodeA.id && l.source === nodeB.id)
        );
      };

      // 1. Update Link Opacities
      d3.selectAll(".link-path").attr("opacity", d => {
        if (!hoveredNode && !hoveredLink) return 0.3;
        if (hoveredLink === d) return 0.7;
        if (hoveredNode && (d.source === hoveredNode.id || d.target === hoveredNode.id)) return 0.6;
        return 0.05;
      });

      // 2. Update Label Opacities (Mirroring Links logic exactly)
      d3.selectAll(".link-label").attr("opacity", d => {
        if (!hoveredNode && !hoveredLink) return 1.0; // Labels visible by default
        
        let linkOpacity;
        if (hoveredLink === d) linkOpacity = 0.7;
        else if (hoveredNode && (d.source === hoveredNode.id || d.target === hoveredNode.id)) linkOpacity = 0.6;
        else linkOpacity = 0.05;

        return linkOpacity > 0.3 ? 1.0 : 0.0;
      });

      // 3. Update Node Opacities
      d3.selectAll(".node-group").attr("opacity", d => {
        if (!hoveredNode && !hoveredLink) return 1;
        if (hoveredNode === d) return 1;
        if (hoveredLink && (hoveredLink.source === d.id || hoveredLink.target === d.id)) return 1;
        if (hoveredNode && isConnected(hoveredNode, d)) return 0.9;
        return 0.3;
      });

      // 4. Toggle Node Glow
      d3.selectAll(".node-glow").attr("opacity", d => d === hoveredNode ? 0.3 : 0);
    }

    // --- SETUP & EVENT LISTENERS ---
    
    // Initial Render
    document.addEventListener("DOMContentLoaded", () => {
      renderChart();

      // UI Controls Logic
      const btnDirect = document.getElementById("btn-tension-direct");
      const btnFlowing = document.getElementById("btn-tension-flowing");

      const updateTensionUI = () => {
        if(currentTension === 0.2) {
          btnDirect.className = "px-3 py-1 text-sm font-medium rounded-md transition-colors bg-slate-100 text-slate-900";
          btnFlowing.className = "px-3 py-1 text-sm font-medium rounded-md transition-colors text-slate-500 hover:text-slate-700";
        } else {
          btnDirect.className = "px-3 py-1 text-sm font-medium rounded-md transition-colors text-slate-500 hover:text-slate-700";
          btnFlowing.className = "px-3 py-1 text-sm font-medium rounded-md transition-colors bg-slate-100 text-slate-900";
        }
      }

      btnDirect.addEventListener("click", () => { currentTension = 0.2; updateTensionUI(); renderChart(); });
      btnFlowing.addEventListener("click", () => { currentTension = 0.5; updateTensionUI(); renderChart(); });

      // Handle window resizing (Equivalent to useEffect resize listener)
      const resizeObserver = new ResizeObserver(() => {
        // Wrap in requestAnimationFrame to avoid ResizeObserver loop limit errors
        window.requestAnimationFrame(() => renderChart());
      });
      resizeObserver.observe(document.getElementById("chart-container"));
    });

    // --- HTMX INTEGRATION ---
    // This listens for when HTMX swaps out elements. 
    // If the data script is updated, we seamlessly rerender D3!
    document.body.addEventListener("htmx:afterSwap", function(evt) {
      if (evt.target.id === "data-store") {
        renderChart();
      }
    });

  </script>
</body>
</html>
