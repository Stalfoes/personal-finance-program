<div id="data-store" style="display: none;">
    <script id="chart-data" data-chart-type="networth" type="application/json">
        {{ chart_data | safe }}
    </script>
</div>


<!-- UI Layout -->
<div class="max-w-6xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
        <h1 class="text-3xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        Net Worth vs. Time
        </h1>
        <p class="text-slate-500 mt-1">Visualize your net worth!</p>
    </div>

    <!-- Controls -->
    <div class="flex bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
        <!-- Example button to show how you'd trigger HTMX to reload data from FastAPI -->
        <form hx-get="/api/networth-data" hx-target="#data-store" class="flex items-center gap-4">
            <div>
                <label for="start_date" class="text-sm font-medium text-slate-700">Start Date</label>
                <!-- We use Jinja {{ start_date }} so the box remembers your selection after the page updates -->
                <input type="date" id="start_date" name="start_date" value="{{ start_date }}" min="0000-01-01" max="9999-12-31" class="ml-2 border rounded p-1 text-sm">
            </div>
            <div>
                <label for="end_date" class="text-sm font-medium text-slate-700">End Date</label>
                <input type="date" id="end_date" name="end_date" value="{{ end_date }}" min="0000-01-01" max="9999-12-31" class="ml-2 border rounded p-1 text-sm">
            </div>
            <div class="px-2 flex items-center border-slate-100 ml-1">
                <button class="text-xs font-semibold bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 transition">
                    Reload Data
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Main Diagram Area -->
<div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden relative">
    <!-- Quick Stats Overlay -->
    <div class="absolute top-6 left-6 flex gap-4 pointer-events-none z-10">
        <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
            <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Net Worth</div>
            <div id="stat-total-networth" class="text-xl font-bold text-orange-600">$3.00</div>
        </div>
        <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
            <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Assets</div>
            <div id="stat-total-assets" class="text-xl font-bold text-green-600">$10.00</div>
        </div>
        <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
            <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Liabilities</div>
            <div id="stat-total-liabilities" class="text-xl font-bold text-red-600">$7.00</div>
        </div>
    </div>
    <!-- Drawing Canvas -->
    <div id="chart-container" class="w-full h-[650px]">
        <svg id="d3-svg" width="100%" height="100%" class="block"></svg>
    </div>
</div>

<div class="max-w-6xl mx-auto mt-6 text-center text-slate-500 text-sm">
    <p>Visualize your Net Worth, Total Asset Value, and Total Liability Value over time. Hover over the lines to isolate them and see individual points.</p>
</div>
